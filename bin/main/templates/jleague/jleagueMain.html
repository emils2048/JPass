<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>J리그 메인</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragment/header :: header}"></div>

<div class="container my-5">

    <h2 class="mb-4">🇯🇵 J1 League Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5>🔴 ライブスコア</h5>
                    <p class="text-muted">現在進行中の試合</p>
                    <a th:href="@{/jleague/live}" class="btn btn-danger btn-sm">ライブ</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5>📅 試合日程</h5>
                    <p class="text-muted">次の試合日程</p>
                    <a th:href="@{/jleague/matchday}" class="btn btn-success btn-sm">日程確認</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5>📊 リーグ順位</h5>
                    <p class="text-muted">現在リーグ順位</p>
                    <a th:href="@{/jleague/standings}" class="btn btn-dark btn-sm">順位</a>
                </div>
            </div>
        </div>

    </div>

</div>

<div th:replace="~{fragment/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
