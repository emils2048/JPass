<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>J1 League 順位</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <h2 class="text-center mb-4">🏆 J1 League 順位</h2>

    <table class="table table-striped table-hover text-center align-middle">
        <thead class="table-dark">
            <tr>
                <th>順位</th>
                <th>チーム</th>
                <th>試合</th>
                <th>勝</th>
                <th>引き分け</th>
                <th>負</th>
                <th>得失点差</th>
                <th>勝点</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="team : ${standings}">
                <td th:text="${team.rank}"></td>

                <td class="text-start">
                    <img th:src="${team.logo}" width="22" class="me-2">
                    <span th:text="${team.name}"></span>
                </td>

                <td th:text="${team.played}"></td>
                <td th:text="${team.win}"></td>
                <td th:text="${team.draw}"></td>
                <td th:text="${team.lose}"></td>
                <td th:text="${team.goalsDiff}"></td>
                <td class="fw-bold" th:text="${team.points}"></td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
