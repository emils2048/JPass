spring.application.name=project1

# 서버포트설정
server.port=8077

# mysql 연결 설정
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/jsl26db?serverTimezone=UTC
spring.datasource.username = jsl26
spring.datasource.password = 1234

# mybatis 설정
mybatis.mapper-locations = classpath:mapper/**/*.xml
#src/main/resources 하위의 mapper폴더 아래 모든 xml파일 및 폴더내의 xml파일
mybatis.type-aliases-package = com.blog.domain
#CRUD 작업할 때 객체형태로 주고받는 DTO클래스가 있는 패키지 설정
mybatis.configuration.map-underscore-to-camel-case=true
#자바객체의 카멜케이스를 DB의 언더스코어로 자동변환 (예 userId -> user_id)

# 파일 저장 경로
file.upload.path = C:/uploads

# 파일 크기 제한
spring.servlet.multipart.max-file-size = 5MB
spring.servlet.multipart.max-request-size = 20MB
spring.servlet.multipart.enabled=true

# thymeleaf 설정
# 템플릿 엔진의 일종. html 태그에 속성을 추가해 페이지에 동적으로 값을 추가하거나 처리할 수 있다.
# 서버 템플릿 엔진 : jsp, thymeleaf, Mustache
# 수정하는 경우 재 시작해야 하는데 이를 무시하고 브라우저에서 새로굄으로 변경사항을 취하도록 설정. 운영중에는 true설정
spring.thymeleaf.cache = false
#spring.thymeleaf.prefix = classpath:/templates/
#spring.thymeleaf.suffix = .html

#view 처리를 담당하는 jsp를 사용하고싶으면
#spring.mvc.view.prefix = /WEB-INF/views/
#spring.mvc.view.suffix = .jsp

# 인코딩 설정
spring.http.encoding.charset = utf-8
spring.http.encoding.enabled = true
spring.http.encoding.force = true

# 메세지 소스 설정
spring.messages.basename = messages
spring.messages.encoding = utf-8
spring.messages.cache-duration=3600

# 구글로그인, 아임포트, groq api 비밀번호등은 이곳에 저장

#j리그
football.api.key=
football.api.url=https://v3.football.api-sports.io