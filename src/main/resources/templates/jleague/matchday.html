<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>J리그 경기 일정</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container my-5">

		<h2 class="mb-4">🇯🇵 J1 League試合日程</h2>

		<div class="list-group">

			<div class="list-group-item mb-2" th:each="match : ${matchday}">
				<div class="d-flex align-items-center">

					<!-- 홈 팀 -->
					<div class="d-flex align-items-center text-truncate"
						style="flex: 1; min-width: 0;">
						<img th:src="${match.homeLogo} ?: '/images/default-logo.png'"
							width="30" class="me-2"> <span th:text="${match.homeName}"></span>
					</div>

					<!-- 점수 중앙 정렬 -->
					<div class="text-center px-3" style="min-width: 60px;">
						<span th:text="${match.homeGoal} ?: '-'"></span> <span
							class="mx-1">:</span> <span th:text="${match.awayGoal} ?: '-'"></span>
					</div>

					<!-- 원정 팀 -->
					<div
						class="d-flex align-items-center text-truncate justify-content-end"
						style="flex: 1; min-width: 0;">
						<span th:text="${match.awayName}" class="me-2"></span> <img
							th:src="${match.awayLogo} ?: '/images/default-logo.png'"
							width="30">
					</div>

				</div>
			</div>


		</div>

	</div>

</body>
</html>
