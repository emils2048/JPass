<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title>メインページ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body>

	<!-- ヘッダー -->
	<div th:replace="~{fragment/header :: header}"></div>

	<div class="container my-5">

		<!-- 🔥 Jリーグチームエリア -->
		<h2 class="mb-4 text-center">Jリーグチーム</h2>

		<div class="row row-cols-2 row-cols-md-4 g-4">

			<div class="col" th:each="team : ${jleagueTeams}">

				<a th:href="@{/jleague/teams/{id}(id=${team.id})}"
					class="card h-100 text-center text-decoration-none text-dark shadow-sm">

					<div class="card-body d-flex flex-column justify-content-center">

						<!-- チームロゴ -->
						<img th:src="${team.logo}" alt="チームロゴ"
							style="height: 100px; object-fit: contain;" class="mb-3">

						<!-- チーム名 -->
						<h6 th:text="${team.name}" class="fw-bold"></h6>

					</div>

				</a>

			</div>

		</div>

	</div>

	<!-- フッター -->
	<div th:replace="~{fragment/footer :: footer}"></div>

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
